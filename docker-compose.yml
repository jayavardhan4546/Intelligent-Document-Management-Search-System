services:
  mysql:
    image: mysql:8.4
    container_name: doc_search_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: doc_search
      MYSQL_USER: doc_user
      MYSQL_PASSWORD: doc_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u doc_user -pdoc_password || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: doc_search_api
    restart: unless-stopped
    environment:
      APP_NAME: Intelligent Document Management & Search System
      DATABASE_URL: mysql+pymysql://doc_user:doc_password@mysql:3306/doc_search
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_BACKEND: sentence_transformer
      ALLOW_HASH_FALLBACK: "true"
      EMBEDDING_DIMENSION: "384"
      CHUNK_SIZE: "900"
      CHUNK_OVERLAP: "150"
      MAX_UPLOAD_MB: "20"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
